version: '3.8'

services:
  mysql:
    image: mysql:8.0.36
    container_name: feed-ask-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feed_ask_ai
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - feed-ask-ai-network

  ollama:
    image: ollama/ollama:latest
    container_name: feed-ask-ai-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      timeout: 10s
      retries: 10
    networks:
      - feed-ask-ai-network


volumes:
  mysql_data:
  ollama_data:

networks:
  feed-ask-ai-network:
    driver: bridge

